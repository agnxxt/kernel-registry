name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: actions/setup-python@v6

      - name: Build Metadata
        id: meta
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Mock Docker Build
        run: |
          echo "Building agnxxt/kernel-api:${{ steps.meta.outputs.tag }}"
          echo "Building agnxxt/kernel-ui:${{ steps.meta.outputs.tag }}"
          echo "Build complete."
