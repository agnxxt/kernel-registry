name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate JSON Schemas
        run: ./scripts/validate_schemas.sh

      - name: Validate Proto Contracts
        run: ./scripts/validate_proto.sh

      - name: Validate Alembic Migration Syntax
        run: |
          python -m py_compile persistence/migrations/env.py
          python -m py_compile persistence/migrations/versions/0001_initial.py

  smoke:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Docker Compose Lint Placeholder
        run: |
          docker compose config
      - name: Install dependencies for testing
        run: pip install requests pytest uvicorn fastapi pydantic sqlalchemy psycopg2-binary litellm

      - name: Run E2E Smoke Test
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          uvicorn kernel_api.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          pytest tests/e2e/test_platform_flow.py
          pytest tests/e2e/test_runtime_core_flow.py

