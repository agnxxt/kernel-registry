name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Validate JSON Schemas
        run: ./scripts/validate_schemas.sh

      - name: Validate Proto Contracts
        run: ./scripts/validate_proto.sh

      - name: Lint Proto with Buf
        run: buf lint

      - name: Check JSON Schema Backward Compatibility
        run: |
          git fetch --no-tags --prune --depth=1 origin main
          ./scripts/check_schema_compat.py origin/main

      - name: Validate Alembic Migration Syntax
        run: |
          python -m py_compile persistence/migrations/env.py
          python -m py_compile persistence/migrations/versions/0001_initial.py

  smoke:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kind
        uses: helm/kind-action@v1

      - name: Kubernetes API smoke (server dry-run)
        run: |
          kubectl cluster-info
          kubectl apply --dry-run=server -f deploy/k8s/kernel-platform.yaml
          kubectl apply --dry-run=server -f deploy/k8s/secret-kernel.yaml
          kubectl apply --dry-run=server -f deploy/k8s/model-runner/model-runner-kernel.yaml
          kubectl apply --dry-run=server -f deploy/k8s/action-adapters.yaml
          kubectl apply --dry-run=server -f deploy/k8s/production-hardening.yaml
          kubectl apply --dry-run=server -f deploy/k8s/feast/feast-kernel.yaml
