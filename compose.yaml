services:
  postgres:
    image: postgres:16-alpine
    container_name: agent-kernel-postgres
    environment:
      POSTGRES_DB: kernel
      POSTGRES_USER: kernel
      POSTGRES_PASSWORD: kernelpass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kernel -d kernel"]
      interval: 10s
      timeout: 5s
      retries: 10

  kernel-tooling:
    build:
      context: .
    container_name: agent-kernel-tooling
    environment:
      DATABASE_URL: postgresql+psycopg2://kernel:kernelpass@postgres:5432/kernel
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -lc "
      ./scripts/validate_schemas.sh &&
      ./scripts/validate_proto.sh &&
      alembic -c persistence/alembic.ini upgrade head &&
      tail -f /dev/null
      "

volumes:
  pg_data:
