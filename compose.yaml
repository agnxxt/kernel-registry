services:
  caddy:
    image: caddy:2.8-alpine
    container_name: agent-kernel-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - kernel-api
      - kernel-ui

  postgres:
    image: postgres:16-alpine
    container_name: agent-kernel-postgres
    environment:
      POSTGRES_DB: kernel
      POSTGRES_USER: kernel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kernelpass}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kernel -d kernel"]
      interval: 10s
      timeout: 5s
      retries: 10

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.1
    container_name: agent-kernel-mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:///mlflow.db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow

  kernel-api:
    build:
      context: .
    container_name: agent-kernel-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://kernel:kernelpass@postgres:5432/kernel}
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started

  kernel-ui:
    build:
      context: ./kernel_ui
    container_name: agent-kernel-ui
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - kernel-api

volumes:
  pg_data:
  mlflow_data:
