services:
  caddy:
    image: caddy:2.8-alpine
    container_name: agent-kernel-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - kernel-api
      - kernel-ui

  postgres:
    image: postgres:16-alpine
    container_name: agent-kernel-postgres
    environment:
      POSTGRES_DB: kernel
      POSTGRES_USER: kernel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kernelpass}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kernel -d kernel"]
      interval: 10s
      timeout: 5s
      retries: 10

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.1
    container_name: agent-kernel-mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:///mlflow.db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow


  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
    container_name: agent-kernel-bus
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:9094
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092,OUTSIDE://localhost:9094
    ports:
      - "9094:9094"

  openfga:
    image: openfga/openfga:latest
    container_name: agent-kernel-authz
    command: run
    environment:
      - OPENFGA_DATA_STORE_ENGINE=postgres
      - OPENFGA_DATA_STORE_URI=postgres://kernel:kernelpass@postgres:5432/kernel?sslmode=disable
    ports:
      - "8081:8081"
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy


  feast:
    image: python:3.12-slim
    container_name: agent-kernel-feast
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - FEAST_REPO_PATH=feature_repo
    command:
      - bash
      - -c
      - "pip install 'feast[postgres]' && feast -c feature_repo ui --host 0.0.0.0 --port 8888"
    ports:
      - "8888:8888"
    depends_on:
      postgres:
        condition: service_healthy


  vault:
    image: hashicorp/vault:latest
    container_name: agent-kernel-vault
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=root
      - VAULT_ADDR=http://0.0.0.0:8200
    cap_add:
      - IPC_LOCK

  temporal:
    image: temporalio/auto-setup:1.22.4
    container_name: agent-kernel-temporal
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=kernel
      - POSTGRES_PWD=kernelpass
      - POSTGRES_SEEDS=postgres
      - SKIP_DB_CREATE=true
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.21.3
    container_name: agent-kernel-temporal-ui
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233

  blockchain:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: agent-kernel-chain
    command: anvil --host 0.0.0.0
    ports:
      - "8545:8545"

  consensus:
    build:
      context: .
    container_name: agent-kernel-consensus
    command: python -m kernel_engine.consensus_engine
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
    depends_on:
      redpanda:
        condition: service_started

  kernel-api:
    build:
      context: .
    container_name: agent-kernel-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://kernel:kernelpass@postgres:5432/kernel}
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started


  opa:
    image: openpolicyagent/opa:latest
    container_name: agent-kernel-opa
    ports:
      - "8181:8181"
    command:
      - "run"
      - "--server"
      - "--log-level=debug"
      - "/policies"
    volumes:
      - ./policies:/policies:ro

  kernel-ui:
    build:
      context: ./kernel_ui
    container_name: agent-kernel-ui
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - kernel-api

volumes:
  pg_data:
  mlflow_data:
