services:
  caddy:
    image: caddy:2.8-alpine
    container_name: agent-kernel-caddy
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: agent-kernel-postgres
    environment:
      POSTGRES_DB: kernel
      POSTGRES_USER: kernel
      POSTGRES_PASSWORD: kernelpass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kernel -d kernel"]
      interval: 10s
      timeout: 5s
      retries: 10

  kernel-tooling:
    build:
      context: .
    container_name: agent-kernel-tooling
    environment:
      DATABASE_URL: postgresql+psycopg2://kernel:kernelpass@postgres:5432/kernel
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -lc "
      ./scripts/validate_schemas.sh &&
      ./scripts/validate_proto.sh &&
      alembic -c persistence/alembic.ini upgrade head &&
      tail -f /dev/null
      "

volumes:
  pg_data:
  caddy_data:
  caddy_config:
