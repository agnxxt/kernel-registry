services:
  postgres:
    image: postgres:16-alpine
    container_name: agent-kernel-postgres
    environment:
      POSTGRES_DB: kernel
      POSTGRES_USER: kernel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kernelpass}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kernel -d kernel"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: agent-kernel-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: agent-kernel-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
      - "9094:9094"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  neo4j:
    image: neo4j:5.25-community
    container_name: agent-kernel-neo4j
    environment:
      NEO4J_AUTH: neo4j/password1234
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.1
    container_name: agent-kernel-mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

  vault:
    image: hashicorp/vault:1.17
    container_name: agent-kernel-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_ADDR: http://0.0.0.0:8200
    cap_add: ["IPC_LOCK"]
    restart: unless-stopped

  openfga:
    image: openfga/openfga:v1.8.4
    container_name: agent-kernel-authz
    command: run
    environment:
      OPENFGA_DATA_STORE_ENGINE: postgres
      OPENFGA_DATA_STORE_URI: postgres://kernel:${POSTGRES_PASSWORD:-kernelpass}@postgres:5432/kernel?sslmode=disable
    ports:
      - "8082:8081"
      - "8083:8082"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  kernel-api:
    build:
      context: .
    container_name: agent-kernel-api
    command: bash -lc "python scripts/wait_for_services.py && uvicorn kernel_api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://kernel:kernelpass@postgres:5432/kernel}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
      FGA_API_URL: ${FGA_API_URL:-http://openfga:8081}
      POSTGRES_PORT: 5432
      KAFKA_PORT: 9092
      WAIT_TIMEOUT: ${WAIT_TIMEOUT:-90}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mlflow:
        condition: service_started
      neo4j:
        condition: service_started
    restart: unless-stopped

  kernel-ui:
    build:
      context: ./kernel_ui
    container_name: agent-kernel-ui
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - kernel-api
    restart: unless-stopped

volumes:
  pg_data:
  neo4j_data:
  mlflow_data:
