syntax = "proto3";

package agnxxt.kernel.secrets.v1;

option go_package = "github.com/agnxxt/agent-kernel-local/gen/secrets/v1;secretsv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

enum SecretProvider {
  SECRET_PROVIDER_UNSPECIFIED = 0;
  VAULT = 1;
  AWS_KMS = 2;
  GCP_KMS = 3;
  AZURE_KEY_VAULT = 4;
  K8S_SECRETS = 5;
}

enum SecretStatus {
  SECRET_STATUS_UNSPECIFIED = 0;
  ACTIVE = 1;
  ROTATING = 2;
  REVOKED = 3;
  EXPIRED = 4;
}

message SecretRef {
  string secret_id = 1;
  string tenant_id = 2;
  string scope = 3; // global|org|project|agent|task
  string scope_ref = 4;
  string name = 5;
  SecretProvider provider = 6;
  string key_ref = 7;
}

message PutSecretRequest {
  SecretRef ref = 1;
  bytes ciphertext = 2;
  string content_type = 3;
  google.protobuf.Timestamp expires_at = 4;
  google.protobuf.Struct tags = 5;
}

message GetSecretRequest {
  SecretRef ref = 1;
  string reason = 2;
}

message GetSecretResponse {
  SecretRef ref = 1;
  bytes plaintext = 2;
  SecretStatus status = 3;
  google.protobuf.Timestamp rotated_at = 4;
}

message RotateSecretRequest {
  SecretRef ref = 1;
  string rotation_policy = 2;
}

message RevokeSecretRequest {
  SecretRef ref = 1;
  string reason = 2;
}

message SecretAuditEvent {
  string event_id = 1;
  string actor = 2;
  string action = 3; // put|get|rotate|revoke|deny
  SecretRef ref = 4;
  string decision = 5; // allow|deny
  string trace_id = 6;
  google.protobuf.Timestamp occurred_at = 7;
  google.protobuf.Struct metadata = 8;
}

message Empty {}

service SecretKernel {
  rpc PutSecret(PutSecretRequest) returns (Empty);
  rpc GetSecret(GetSecretRequest) returns (GetSecretResponse);
  rpc RotateSecret(RotateSecretRequest) returns (Empty);
  rpc RevokeSecret(RevokeSecretRequest) returns (Empty);
}
