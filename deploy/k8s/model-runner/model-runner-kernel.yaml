apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-runner-kernel
  namespace: agent-kernel
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-runner-kernel
  namespace: agent-kernel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: model-runner-kernel
  template:
    metadata:
      labels:
        app: model-runner-kernel
    spec:
      serviceAccountName: model-runner-kernel
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: model-runner-kernel
        image: ghcr.io/agnxxt/model-runner-kernel:0.1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 7091
          name: grpc
        env:
        - name: DEFAULT_PROVIDER
          value: litellm
        - name: LITELLM_BASE_URL
          value: http://litellm.agent-kernel.svc.cluster.local:4000
        - name: REQUEST_TOPIC
          value: kernel.inference.request.v1
        - name: RESULT_TOPIC
          value: kernel.inference.result.v1
        - name: AUDIT_TOPIC
          value: kernel.inference.audit.v1
        readinessProbe:
          tcpSocket:
            port: grpc
          initialDelaySeconds: 10
        livenessProbe:
          tcpSocket:
            port: grpc
          initialDelaySeconds: 20
        startupProbe:
          tcpSocket:
            port: grpc
          failureThreshold: 30
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: model-runner-kernel
  namespace: agent-kernel
spec:
  selector:
    app: model-runner-kernel
  ports:
  - name: grpc
    port: 7091
    targetPort: 7091

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: model-runner-kernel
  namespace: agent-kernel
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: model-runner-kernel
