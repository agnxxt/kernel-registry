apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-kernel
  namespace: agent-kernel
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-kernel
  namespace: agent-kernel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: secret-kernel
  template:
    metadata:
      labels:
        app: secret-kernel
    spec:
      serviceAccountName: secret-kernel
      containers:
      - name: secret-kernel
        image: ghcr.io/agnxxt/secret-kernel:0.1.0
        ports:
        - containerPort: 7071
          name: grpc
        env:
        - name: DEFAULT_PROVIDER
          value: vault
        - name: AUDIT_TOPIC
          value: kernel.secrets.audit.v1
        - name: ROTATION_TOPIC
          value: kernel.secrets.rotation.v1
        readinessProbe:
          tcpSocket:
            port: grpc
          initialDelaySeconds: 10
        livenessProbe:
          tcpSocket:
            port: grpc
          initialDelaySeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: secret-kernel
  namespace: agent-kernel
spec:
  selector:
    app: secret-kernel
  ports:
  - name: grpc
    port: 7071
    targetPort: 7071
