apiVersion: v1
kind: ServiceAccount
metadata:
  name: action-adapters
  namespace: agent-kernel
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: action-adapters
  namespace: agent-kernel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: action-adapters
  template:
    metadata:
      labels:
        app: action-adapters
    spec:
      serviceAccountName: action-adapters
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: action-adapters
        image: ghcr.io/agnxxt/action-adapters:0.1.0
        imagePullPolicy: IfNotPresent
        env:
        - name: ENABLED_ADAPTERS
          value: git,docker,caddy
        - name: ACTION_REQUEST_TOPIC
          value: kernel.action.request.v1
        - name: ACTION_RESULT_TOPIC
          value: kernel.action.result.v1
        ports:
        - containerPort: 7101
          name: grpc
        readinessProbe:
          tcpSocket:
            port: grpc
          initialDelaySeconds: 10
        livenessProbe:
          tcpSocket:
            port: grpc
          initialDelaySeconds: 20
        startupProbe:
          tcpSocket:
            port: grpc
          failureThreshold: 30
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop: ["ALL"]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: action-adapters
  namespace: agent-kernel
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: action-adapters
---
apiVersion: v1
kind: Service
metadata:
  name: action-adapters
  namespace: agent-kernel
spec:
  selector:
    app: action-adapters
  ports:
  - name: grpc
    port: 7101
    targetPort: 7101
